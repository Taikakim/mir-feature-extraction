[server]
# Root of the pre-encoded full-mix dataset (SAT training data — do not mix stems here)
latent_dir = /run/media/kim/Lehto/goa-small

# Root of the pre-encoded stem dataset (separate from training data)
stem_dir = /run/media/kim/Lehto/goa-stems

# Root of the original source audio (full mixes and stems).
# Used for raw=1 playback — mirrors the same directory structure as latent_dir/stem_dir.
raw_audio_dir = /run/media/kim/Mantu/ai-music/Goa_Separated_crops

# Root of the full-track Goa_Separated source (pre-separation audio + beat grids).
# Used to look up full-track .DOWNBEATS files for downbeat BPM refinement in crossfade.
source_dir = /run/media/kim/Mantu/ai-music/Goa_Separated

port = 7891

[model]
# Path to the stable-audio-tools installation.
# Used to resolve default model_config and ckpt_path paths below.
sao_dir = /home/kim/Projects/SAO/stable-audio-tools

model_config = %(sao_dir)s/models/checkpoints/small/base_model_config.json
ckpt_path    = %(sao_dir)s/models/checkpoints/small/base_model.ckpt
model_half   = true
device       = cuda

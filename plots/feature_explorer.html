      const t = document.getElementById('tl-title'); if (t) t.textContent = 'Tracks';
      const b = document.getElementById('track-list-body');
      if (b) b.innerHTML = '<div style="padding:12px;color:#555;font-size:11px;text-align:center;">Select points, click histogram bars, or drag parallel bands</div>';
    }

    // ---- Radar multi-select -----------------------------------------------------
    function handleRadarClick() {
      const pd = document.getElementById('plot');
      pd.removeAllListeners('plotly_click');
      pd.on('plotly_click', function (d) {
        if (d.points && d.points.length > 0) {
          const pt = d.points[0];
          const label = pt.theta;
          const curveIdx = pt.curveNumber; // 0=Inner, 1=Mid, 2=Outer
          if (!label || curveIdx > 2) return;

          const tIdx = TRACKS.indexOf(globalActiveTrack);
          if (tIdx < 0) return;
          const cf = CURATED.filter(f => FEATURES.includes(f) && DATA[f][tIdx] !== null && isFinite(DATA[f][tIdx]));
          const fIdx = cf.map(shortLabel).indexOf(label);
          if (fIdx < 0) return;
          const feat = cf[fIdx];

          const blockKey = feat + '_' + curveIdx;
          if (_radarSelections.has(blockKey)) _radarSelections.delete(blockKey);
          else _radarSelections.add(blockKey);

          updateRadar();
        }
      });
    }

    // ---- CLASSES ---------------------------------------------------------------
    const CLASS_COLORS = [
      '#ff4b4b', '#4cd137', '#00d2ff', '#fbc531', '#9c88ff', '#ff79c6', '#ff9f43', '#0097e6', '#bdc581', '#fd7272',
      '#5f27cd', '#55efc4', '#81ecec', '#ff7675', '#a29bfe', '#e1b12c', '#00cec9', '#e84393', '#badc58', '#c8d6e5'
    ];
    function updateClasses() {
      if (typeof CLASSES === 'undefined') { document.getElementById('info-bar').textContent = 'Classes data not loaded'; return; }
      const kx = document.getElementById('sel-x').value;
      const ky = document.getElementById('sel-y').value;
      const classKey = document.getElementById('cls-by').value;
      const showTrend = document.getElementById('chk-class-trend').checked;
      if (!kx || !ky || !classKey) return;
      const dx = DATA[kx], dy = DATA[ky], labels = CLASSES[classKey];
      if (!dx || !dy || !labels) return;
      // Parse class labels (handle stringified dicts/lists)
      const parseLabel = v => {
        if (!v || v === '{}' || v === '[]' || v === "['']" || v.trim() === '') return '';
        // Dict format: pick top key
        if (v.startsWith('{')) {
          const m = v.match(/['"]([^'"]+)['"]/); return m ? m[1] : '';
        }
        // List format: pick first item
        if (v.startsWith('[')) {
          const m = v.match(/['"]([^'"]+)['"]/); return m ? m[1] : '';
        }
        return v;
      };
      // Build groups
      const groups = {};
      for (let i = 0; i < TRACKS.length; i++) {
        if (dx[i] === null || dy[i] === null || !isFinite(dx[i]) || !isFinite(dy[i])) continue;
        let lbl = parseLabel(labels[i]);
        if (!lbl) lbl = '(unknown)';
        if (!groups[lbl]) groups[lbl] = { x: [], y: [], names: [], idxs: [] };
        groups[lbl].x.push(dx[i]); groups[lbl].y.push(dy[i]);
        groups[lbl].names.push(TRACKS[i]); groups[lbl].idxs.push(i);
      }
      // Sort by count, keep top 20 + merge rest into 'other'
      let sorted = Object.entries(groups).sort((a, b) => b[1].x.length - a[1].x.length);
      if (sorted.length > 20) {
        const top = sorted.slice(0, 20);
        const rest = sorted.slice(20);
        const other = { x: [], y: [], names: [], idxs: [] };
        rest.forEach(([, g]) => { other.x.push(...g.x); other.y.push(...g.y); other.names.push(...g.names); other.idxs.push(...g.idxs); });
        top.push(['(other)', other]);
        sorted = top;
      }
      const ux = UNITS[kx] && UNITS[kx] !== '-' ? ' [' + UNITS[kx] + ']' : '';
      const uy = UNITS[ky] && UNITS[ky] !== '-' ? ' [' + UNITS[ky] + ']' : '';

      let oldVis = {};
      const pd = document.getElementById('plot');
      if (pd && pd.data && pd.layout && pd.layout.title && pd.layout.title.text && pd.layout.title.text.includes('by ' + classKey.replace(/_/g, ' '))) {
        pd.data.forEach(t => { if (t.legendgroup) oldVis[t.legendgroup] = t.visible; });
      }

      const traces = sorted.map(([lbl, g], ci) => ({
        x: g.x, y: g.y, mode: 'markers', type: 'scattergl',
        marker: { color: CLASS_COLORS[ci % CLASS_COLORS.length], size: 5, opacity: 0.7 },
        hovertext: g.names.map((n, j) => '<b>' + n + '</b><br>' + kx + ': ' + g.x[j].toFixed(3) + '<br>' + ky + ': ' + g.y[j].toFixed(3) + '<br>' + classKey.replace(/_/g, ' ') + ': ' + lbl),
        hoverinfo: 'text', name: lbl + ' (' + g.x.length + ')',
        legendgroup: lbl,
        visible: oldVis[lbl] !== undefined ? oldVis[lbl] : true,
        customdata: g.idxs
      }));

      if (showTrend) {
        sorted.forEach(([lbl, g], ci) => {
          if (g.x.length < 3) return;
          const n = g.x.length;
          const mx = g.x.reduce((a, b) => a + b) / n, my = g.y.reduce((a, b) => a + b) / n;
          let num = 0, den = 0;
          for (let i = 0; i < n; i++) { num += (g.x[i] - mx) * (g.y[i] - my); den += (g.x[i] - mx) ** 2; }
          if (den === 0) return;
          const s = num / den, ic = my - s * mx;
          const xmn = Math.min(...g.x), xmx = Math.max(...g.x);
          traces.push({
            x: [xmn, xmx], y: [s * xmn + ic, s * xmx + ic], mode: 'lines',
            line: { color: CLASS_COLORS[ci % CLASS_COLORS.length], width: 2, dash: 'dash' },
            name: lbl + ' (trend)', hoverinfo: 'skip',
            legendgroup: lbl,
            visible: oldVis[lbl] !== undefined ? oldVis[lbl] : true,
            showlegend: false
          });
        });
      }

      Plotly.react('plot', traces, {
        title: { text: kx + ' vs ' + ky + ' by ' + classKey.replace(/_/g, ' '), font: { size: 15 } },
        xaxis: { title: kx + ux }, yaxis: { title: ky + uy },
        template: 'plotly_dark', paper_bgcolor: '#1a1a2e', plot_bgcolor: '#16213e',
        font: { color: '#cccccc' }, hoverlabel: { bgcolor: '#0f3460', font: { size: 12, color: 'white' } },
        showlegend: true, legend: { x: 1.02, y: 1, bgcolor: 'rgba(15,52,96,0.8)', font: { size: 10 } },
        margin: { t: 46, b: 48, l: 58, r: 180 }
      }, { responsive: true });
      const cpd = document.getElementById('plot');
      cpd.removeAllListeners('plotly_click');
      cpd.on('plotly_click', function (d) {
        if (d.points && d.points.length > 0) {
          const pt = d.points[0];
          const idx = pt.customdata;
          if (idx !== undefined) {
            globalActiveTrack = TRACKS[idx];
            syncTrackSelects();
            setMode('radar');
          }
        }
      });
      const totalTracks = sorted.reduce((s, [, g]) => s + g.x.length, 0);
      document.getElementById('info-bar').textContent = 'Classes: ' + classKey.replace(/_/g, ' ') + ' | ' + sorted.length + ' groups | ' + totalTracks + ' tracks';
    }

    // ---- Caption Popup ---------------------------------------------------------
    let _captionsLoaded = false, _captionsLoading = false;
    function toggleCaptions() {
      const on = document.getElementById('chk-captions').checked;
      if (on && !_captionsLoaded && !_captionsLoading) {
        _captionsLoading = true;
        document.getElementById('info-bar').textContent = 'Loading captions (8MB)...';
        const s = document.createElement('script');
        s.src = 'feature_explorer_captions.js';
        s.onload = function () {
          _captionsLoaded = true; _captionsLoading = false;
          document.getElementById('info-bar').textContent = 'Captions loaded \u2714';
          setupCaptionHover();
        };
        s.onerror = function () {
          _captionsLoading = false;
          document.getElementById('info-bar').textContent = '\u26a0 Failed to load captions';
          document.getElementById('chk-captions').checked = false;
        };
        document.head.appendChild(s);
      } else if (on && _captionsLoaded) {
        setupCaptionHover();
      } else {
        removeCaptionHover();
        document.getElementById('caption-popup').style.display = 'none';
      }
    }
    let _capHoverBound = false;
    function setupCaptionHover() {
      if (_capHoverBound) return;
      _capHoverBound = true;
      const pd = document.getElementById('plot');
      pd.on('plotly_hover', onCaptionHover);
      pd.on('plotly_unhover', onCaptionUnhover);
    }
    function removeCaptionHover() {
      _capHoverBound = false;
      const pd = document.getElementById('plot');
      pd.removeListener('plotly_hover', onCaptionHover);
      pd.removeListener('plotly_unhover', onCaptionUnhover);
    }
    function onCaptionHover(d) {
      if (!document.getElementById('chk-captions').checked) return;
      if (!d.points || !d.points.length) return;
      const pt = d.points[0];
      const idx = pt.customdata;
      if (idx === undefined || typeof CAPTIONS === 'undefined') return;
      const popup = document.getElementById('caption-popup');
      let html = '<h4>' + TRACKS[idx] + '</h4>';
      Object.keys(CAPTIONS).forEach(key => {
        const val = CAPTIONS[key][idx];
        if (!val || val.trim() === '') return;
        const label = key.replace(/^music_flamingo_?/, '').replace(/_/g, ' ') || 'full';
        html += '<div class="cap-section"><div class="cap-label">' + label + '</div><div class="cap-text">' + val.replace(/</g, '&lt;').replace(/>/g, '&gt;') + '</div></div>';
      });
      popup.innerHTML = html;
      popup.style.display = 'block';
    }
    function onCaptionUnhover() {
      document.getElementById('caption-popup').style.display = 'none';
    }

    // ---- Latent Player ---------------------------------------------------------
    const LP_SERVER = 'http://localhost:7891';

    // UI state
    let _lpVisible       = false;
    let _lpCurrentTrack  = null;
    let _lpHoverTrack    = null;   // last track hovered, regardless of autoplay
    let _lpAutoLoadSlot  = 'a';    // which slot hover auto-loads into: 'a' or 'b'
    let _lpRaw           = false;  // play original source audio instead of VAE decode
    let _lpHighlightIdx  = null;
    let _lpBTrack        = null;
    let _lpBHighlightIdx = null;
    let _lpAutoLoad      = true;
    let _lpAutoPlay      = false;
    let _lpLoop          = false;
    let _lpSmartLoop     = false;
    let _lpReady         = false;
    let _lpDebounceTimer = null;
    let _lpLeaveTimer    = null;

    // Crossfader state
    let _lpMode     = 'fullmix';   // 'fullmix' | 'crossfader'
    let _lpCfInterp = 'slerp';
    let _lpCfTimer  = null;

    // Web Audio state (gapless looping — <audio loop> always has a seek gap)
    let _lpAudioCtx    = null;
    let _lpAudioBuffer = null;
    let _lpSourceNode  = null;
    let _lpPauseOffset = 0;
    let _lpPlayStart   = 0;

    function _lpGetCtx() {
      if (!_lpAudioCtx) _lpAudioCtx = new AudioContext();
      if (_lpAudioCtx.state === 'suspended') _lpAudioCtx.resume();
      return _lpAudioCtx;
    }
    function _lpIsPlaying() { return _lpSourceNode !== null; }
    function _lpBtn(txt) { const b = document.getElementById('lp-play-btn'); if (b) b.textContent = txt; }

    function _lpStartSource(offset) {
      if (!_lpAudioBuffer) return;
      const ctx = _lpGetCtx();
      if (_lpSourceNode) { try { _lpSourceNode.stop(); } catch(e){} _lpSourceNode = null; }
      const src = ctx.createBufferSource();
      src.buffer = _lpAudioBuffer;
      src.loop   = _lpLoop;
      src.connect(ctx.destination);
      const off = Math.max(0, offset % _lpAudioBuffer.duration);
      src.start(0, off);
      _lpSourceNode = src;
      _lpPlayStart  = ctx.currentTime - off;
      _lpBtn('\u23f8');
      src.onended = () => {
        if (_lpSourceNode === src) { _lpSourceNode = null; _lpPauseOffset = 0; _lpBtn('\u25b6'); }
      };
    }

    function lpStopPlayback() {
      if (_lpSourceNode) { try { _lpSourceNode.stop(); } catch(e){} _lpSourceNode = null; }
      _lpPauseOffset = 0;
      _lpBtn('\u25b6');
    }

    function lpTogglePanel() {
      _lpVisible = !_lpVisible;
      document.getElementById('latent-player').style.display = _lpVisible ? '' : 'none';
      document.getElementById('btn-lp').classList.toggle('active', _lpVisible);
      if (_lpVisible) _lpPollStatus();
    }

    function _lpSetAutoLoadSlot(slot) {
      _lpAutoLoadSlot = slot;
      const el = document.getElementById('lp-autoload-slot');
      if (el) {
        el.textContent = slot.toUpperCase();
        el.style.background = slot === 'a' ? '#e94560' : '#5bc4ff';
        el.style.color = slot === 'a' ? '#ffffff' : '#0a1628';
      }
    }

    function lpHover(trackName) {
      clearTimeout(_lpLeaveTimer);
      if (trackName) _lpHoverTrack = trackName;
      if (!_lpVisible || !_lpAutoLoad || !_lpAutoPlay || !trackName) return;
      clearTimeout(_lpDebounceTimer);
      if (_lpAutoLoadSlot === 'b') {
        if (trackName === _lpBTrack) return;
        _lpDebounceTimer = setTimeout(() => {
          const pos = parseFloat(document.getElementById('lp-pos').value);
          lpSetB(trackName);
          if (_lpMode === 'crossfader' && _lpCurrentTrack) lpCrossfade();
          else lpLoad(trackName, pos);
        }, 350);
      } else {
        if (trackName === _lpCurrentTrack) return;
        _lpDebounceTimer = setTimeout(() => {
          const pos = parseFloat(document.getElementById('lp-pos').value);
          lpLoad(trackName, pos);
        }, 350);
      }
    }

    function lpStopOnLeave() {
      clearTimeout(_lpDebounceTimer);   // cancel any pending hover-load
      if (!_lpAutoPlay) return;
      clearTimeout(_lpLeaveTimer);
      _lpLeaveTimer = setTimeout(lpStopPlayback, 400);
    }

    function lpLoad(trackName, position) {
      if (!trackName) return;
      const pos = (position !== undefined) ? position : parseFloat(document.getElementById('lp-pos').value);
      _lpCurrentTrack = trackName;
      _lpHighlightIdx = TRACKS.indexOf(trackName);
      _lpReady = false;
      _lpApplyHighlight();
      const _lpAIn = document.getElementById('lp-a-search'); if (_lpAIn) _lpAIn.value = trackName;
      document.getElementById('lp-status').textContent = 'Loading\u2026';
      const _cropEl = document.getElementById('lp-crop-count');
      _cropEl.textContent = ''; _cropEl.title = '';
      lpStopPlayback();

      if (_lpMode === 'crossfader') {
        if (_lpBTrack) lpCrossfade();
        else document.getElementById('lp-status').textContent = 'Set B track to crossfade';
        return;
      }

      const url = LP_SERVER + '/decode?track=' + encodeURIComponent(trackName) +
                  '&position=' + pos.toFixed(3) +
                  (_lpSmartLoop ? '&smart_loop=1' : '') +
                  (_lpRaw ? '&raw=1' : '');
      fetch(url)
        .then(r => {
          if (!r.ok) return r.text().then(t => { throw new Error(t || 'HTTP ' + r.status); });
          const count = r.headers.get('X-Crop-Count');
          const idx   = r.headers.get('X-Crop-Index');
          const actual = r.headers.get('X-Crop-Position');
          const cropEl = document.getElementById('lp-crop-count');
          if (count && idx) {
            cropEl.textContent = 'slice ' + idx + '/' + count;
            cropEl.title = 'position ' + (actual ? parseFloat(actual).toFixed(3) : '?');
          } else if (count) {
            cropEl.textContent = count + ' crops';
          }
          if (actual) {
            const a = parseFloat(actual);
            document.getElementById('lp-pos').value = a;
            document.getElementById('lp-pos-label').textContent = a.toFixed(2);
          }
          return r.blob();
        })
        .then(blob => blob.arrayBuffer())
        .then(ab   => _lpGetCtx().decodeAudioData(ab))
        .then(buf  => {
          _lpAudioBuffer = buf;
          _lpPauseOffset = 0;
          _lpReady = true;
          document.getElementById('lp-status').textContent =
            'Ready \u2014 ' + buf.duration.toFixed(1) + 's';
          if (_lpAutoPlay) _lpStartSource(0);
        })
        .catch(e => {
          document.getElementById('lp-status').textContent = 'Error: ' + e.message;
        });
    }

    function lpOnLoopChange(v) {
      _lpLoop = v;
      if (_lpSourceNode) _lpSourceNode.loop = v;
      if (!v) { _lpSmartLoop = false; document.getElementById('lp-smartloop').checked = false; }
    }

    function lpOnSmartLoopChange(v) {
      _lpSmartLoop = v;
      if (v) {
        _lpLoop = true;
        if (_lpSourceNode) _lpSourceNode.loop = true;
        document.getElementById('lp-loop').checked = true;
      }
      if (_lpCurrentTrack) lpLoad(_lpCurrentTrack);
    }

    function lpPlay() {
      if (!_lpReady) {
        document.getElementById('lp-status').textContent =
          _lpCurrentTrack ? 'Still loading\u2026' : 'Hover a track first';
        return;
      }
      if (_lpIsPlaying()) {
        _lpPauseOffset = (_lpGetCtx().currentTime - _lpPlayStart) % _lpAudioBuffer.duration;
        _lpSourceNode.stop();
        _lpSourceNode = null;
        _lpBtn('\u25b6');
      } else {
        _lpStartSource(_lpPauseOffset);
      }
    }

    function lpOnPosChange(val) {
      document.getElementById('lp-pos-label').textContent = parseFloat(val).toFixed(2);
      if (_lpCurrentTrack) {
        clearTimeout(_lpDebounceTimer);
        _lpDebounceTimer = setTimeout(() => lpLoad(_lpCurrentTrack, parseFloat(val)), 400);
      }
    }

    function _lpOnPlotlyHover(d) {
      if (!d.points || !d.points.length) return;
      const idx = d.points[0].customdata;
      if (idx !== undefined) lpHover(TRACKS[idx]);
    }

    // ---- Scatter highlights (A = white ring, B = cyan ring) ---------------------
    function _lpFindXY(idx) {
      const pd = document.getElementById('plot');
      if (!pd || !pd.data) return [null, null];
      for (const t of pd.data) {
        if (!Array.isArray(t.customdata)) continue;
        const j = t.customdata.indexOf(idx);
        if (j >= 0 && Array.isArray(t.x) && Array.isArray(t.y)) return [t.x[j], t.y[j]];
      }
      return [null, null];
    }

    function _lpApplyHighlight() {
      if (['histogram', 'radar', 'heatmap', 'parallel'].includes(mode)) return;
      const pd = document.getElementById('plot');
      if (!pd || !pd.data) return;
      // Remove existing highlight traces
      const old = pd.data.reduce((a, t, i) => {
        if (t.name === '__lp_hl__' || t.name === '__lp_b_hl__') a.push(i); return a;
      }, []);
      if (old.length) Plotly.deleteTraces('plot', old);
      // A highlight — white ring
      if (_lpHighlightIdx !== null) {
        const [hx, hy] = _lpFindXY(_lpHighlightIdx);
        if (hx !== null) Plotly.addTraces('plot', {
          x: [hx], y: [hy], mode: 'markers', type: 'scatter',
          marker: { color: '#1a1a2e', size: 12, line: { color: '#ffffff', width: 2.5 } },
          hoverinfo: 'skip', showlegend: false, name: '__lp_hl__'
        });
      }
      // B highlight — cyan ring
      if (_lpBHighlightIdx !== null) {
        const [bx, by] = _lpFindXY(_lpBHighlightIdx);
        if (bx !== null) Plotly.addTraces('plot', {
          x: [bx], y: [by], mode: 'markers', type: 'scatter',
          marker: { color: '#1a1a2e', size: 12, line: { color: '#5bc4ff', width: 2.5 } },
          hoverinfo: 'skip', showlegend: false, name: '__lp_b_hl__'
        });
      }
    }

    // ---- B slot -----------------------------------------------------------------
    function lpSetB(trackName) {
      const name = (trackName !== undefined) ? trackName : _lpCurrentTrack;
      if (!name) return;
      _lpBTrack        = name;
      _lpBHighlightIdx = TRACKS.indexOf(name);
      const el = document.getElementById('lp-b-search');
      if (el) el.value = name;
      _lpApplyHighlight();
    }

    // ---- Crossfader controls ---------------------------------------------------
    function lpSetMode(mode) {
      _lpMode = mode;
      const isCf = mode === 'crossfader';
      document.getElementById('lp-cf-section').style.display = isCf ? '' : 'none';
      document.getElementById('lp-mode-fullmix').classList.toggle('active', !isCf);
      document.getElementById('lp-mode-cf').classList.toggle('active', isCf);
      document.getElementById('lp-pos-label-text').textContent = isCf ? 'A pos' : 'Pos';
      lpStopPlayback();
    }

    function lpToggleRaw() {
      _lpRaw = !_lpRaw;
      document.getElementById('lp-raw-btn').classList.toggle('active', _lpRaw);
      // Refetch immediately so the toggle is audible on the running loop
      if (_lpMode === 'crossfader' && _lpCurrentTrack && _lpBTrack) lpCrossfade();
      else if (_lpCurrentTrack) lpLoad(_lpCurrentTrack);
    }

    function lpSetInterp(interp) {
      _lpCfInterp = interp;
      document.getElementById('lp-interp-slerp').classList.toggle('active', interp === 'slerp');
      document.getElementById('lp-interp-lerp').classList.toggle('active',  interp === 'lerp');
    }

    function lpCfLabelUpdate(id, val) {
      document.getElementById(id).textContent = parseFloat(val).toFixed(2);
    }

    function lpCfOnSliderChange() {
      clearTimeout(_lpCfTimer);
      _lpCfTimer = setTimeout(lpCrossfade, 150);
    }

    function lpCrossfade() {
      if (!_lpCurrentTrack || !_lpBTrack) {
        document.getElementById('lp-status').textContent =
          _lpCurrentTrack ? 'Set B track first' : 'Set A and B tracks first';
        return;
      }
      const pos_a  = document.getElementById('lp-pos').value;
      const pos_b  = document.getElementById('lp-cf-bpos').value;
      const drums  = document.getElementById('lp-cf-drums').value;
      const bass   = document.getElementById('lp-cf-bass').value;
      const other  = document.getElementById('lp-cf-other').value;
      const vocals = document.getElementById('lp-cf-vocals').value;
      const beta_a = document.getElementById('lp-cf-betaa').value;
      const beta_b = document.getElementById('lp-cf-betab').value;

      _lpReady = false;
      lpStopPlayback();
      document.getElementById('lp-status').textContent = 'Decoding 4 stems\u2026';

      const url = LP_SERVER + '/crossfade'
        + '?track_a='    + encodeURIComponent(_lpCurrentTrack)
        + '&track_b='    + encodeURIComponent(_lpBTrack)
        + '&pos_a='      + parseFloat(pos_a).toFixed(3)
        + '&pos_b='      + parseFloat(pos_b).toFixed(3)
        + '&drums='      + parseFloat(drums).toFixed(3)
        + '&bass='       + parseFloat(bass).toFixed(3)
        + '&other='      + parseFloat(other).toFixed(3)
        + '&vocals='     + parseFloat(vocals).toFixed(3)
        + '&beta_a='     + parseFloat(beta_a).toFixed(3)
        + '&beta_b='     + parseFloat(beta_b).toFixed(3)
        + '&interp='     + _lpCfInterp
        + (_lpSmartLoop ? '&smart_loop=1' : '')
        + (_lpRaw ? '&raw=1' : '');

      fetch(url)
        .then(r => {
          if (!r.ok) return r.text().then(t => { throw new Error(t || 'HTTP ' + r.status); });
          return r.blob();
        })
        .then(blob => blob.arrayBuffer())
        .then(ab   => _lpGetCtx().decodeAudioData(ab))
        .then(buf  => {
          _lpAudioBuffer = buf;
          _lpPauseOffset = 0;
          _lpReady = true;
          document.getElementById('lp-status').textContent =
            'Crossfade ready \u2014 ' + buf.duration.toFixed(1) + 's';
          _lpStartSource(0);
        })
        .catch(e => {
          document.getElementById('lp-status').textContent = 'Error: ' + e.message;
        });
    }

    function lpCfStop() { lpStopPlayback(); }

    // Patch updatePlot so the highlight survives every plot refresh
    const _lp_origUpdatePlot = updatePlot;
    updatePlot = function() { _lp_origUpdatePlot(); _lpApplyHighlight(); };

    let _lpServerOk = false;
    function _lpPollStatus() {
      fetch(LP_SERVER + '/status', { signal: AbortSignal.timeout(3000) })
        .then(r => r.ok ? r.json() : Promise.reject())
        .then(() => {
          _lpServerOk = true;
          document.getElementById('lp-server-dot').style.background = '#4cd137';
          document.getElementById('lp-server-label').textContent = 'Server OK';
        })
        .catch(() => {
          _lpServerOk = false;
          document.getElementById('lp-server-dot').style.background = '#e94560';
          document.getElementById('lp-server-label').textContent = 'Server offline';
        });
    }
    setInterval(_lpPollStatus, 8000);

    // ---- Init ------------------------------------------------------------------
    const simSearch = document.getElementById('sim-search');
    const simRes = document.getElementById('sim-search-results');

    function renderSimSearch(q) {
      simRes.innerHTML = '';
      let hits = 0;
      for (let i = 0; i < TRACKS.length; i++) {
        if (q.length === 0 || TRACKS[i].toLowerCase().includes(q)) {
          const div = document.createElement('div');
          div.className = 'sim-search-item';
          div.textContent = TRACKS[i];
          div.onclick = function () {
            globalActiveTrack = TRACKS[i];
            simSearch.value = TRACKS[i];
            simRes.style.display = 'none';
            syncTrackSelects(true);
          };
          simRes.appendChild(div);
          if (++hits >= 150) break;
        }
      }
      if (hits === 0) {
        simRes.innerHTML = '<div class="sim-search-item" style="color:#888;cursor:default;">No matches</div>';
      }
      simRes.style.display = 'block';
    }

    simSearch.addEventListener('input', e => renderSimSearch(e.target.value.toLowerCase()));
    simSearch.addEventListener('focus', e => {
      e.target.value = ''; // Clear to allow instant search across all
      renderSimSearch('');
    });

    document.addEventListener('click', function (e) {
      const c = document.getElementById('sim-search-container');
      if (c && !c.contains(e.target)) {
        simRes.style.display = 'none';
        if (simSearch.value === '' && globalActiveTrack) {
          simSearch.value = globalActiveTrack; // Restore visual name if they clicked away without choosing
        }
      }
    });

    clearTrackList();
    populateSelects();
    updatePlot();
    window.addEventListener('resize', () => Plotly.Plots.resize('plot'));

    // Permanent plotly hover/unhover listeners for latent player
    document.getElementById('plot').on('plotly_hover',   _lpOnPlotlyHover);
    document.getElementById('plot').on('plotly_unhover', lpStopOnLeave);

    // Global keyboard shortcuts
    document.addEventListener('keydown', function(e) {
      // Ignore when typing in an input / textarea
      if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA' ||
          e.target.tagName === 'SELECT') return;
      if (e.key === 'r' || e.key === 'R') setMode('radar');
      if ((e.key === 'a' || e.key === 'A') && _lpVisible) {
        const t = _lpHoverTrack || globalActiveTrack;
        if (t) lpLoad(t, parseFloat(document.getElementById('lp-pos').value));
        _lpSetAutoLoadSlot('a');
      }
      if ((e.key === 'b' || e.key === 'B') && _lpVisible) {
        const t = _lpHoverTrack || globalActiveTrack;
        if (t) lpSetB(t);
        _lpSetAutoLoadSlot('b');
      }
    });

    // Ctrl+wheel: move all stem α crossfaders together (LP must be open in crossfader mode)
    const _CF_STEM_IDS = ['lp-cf-drums', 'lp-cf-bass', 'lp-cf-other', 'lp-cf-vocals'];
    document.addEventListener('wheel', function(e) {
      if (!_lpVisible || _lpMode !== 'crossfader' || !e.ctrlKey) return;
      e.preventDefault();
      const step = e.deltaY > 0 ? -0.05 : 0.05;
      _CF_STEM_IDS.forEach(id => {
        const el = document.getElementById(id);
        if (!el) return;
        const v = Math.max(0, Math.min(1, parseFloat(el.value) + step));
        el.value = v.toFixed(2);
        lpCfLabelUpdate(id + '-val', v.toFixed(2));
      });
      lpCfOnSliderChange();
    }, { passive: false });

    // Mouseover/mouseleave delegation on list panels for latent player
    ['track-list-body', 'nn-track-list', 'sel-list'].forEach(id => {
      const el = document.getElementById(id);
      if (el) {
        el.addEventListener('mouseover', function (e) {
          const item = e.target.closest('[data-lp-idx]');
          if (item) lpHover(TRACKS[parseInt(item.dataset.lpIdx)]);
        });
        el.addEventListener('mouseleave', lpStopOnLeave);
      }
    });

    // ---- LP slot search inputs ------------------------------------------------
    function _lpRenderSearch(inputEl, resultsEl, q, onSelect) {
      resultsEl.innerHTML = '';
      const ql = q.toLowerCase();
      let hits = 0;
      for (let i = 0; i < TRACKS.length; i++) {
        if (q.length === 0 || TRACKS[i].toLowerCase().includes(ql)) {
          const div = document.createElement('div');
          div.className = 'sim-search-item';
          div.textContent = TRACKS[i];
          div.addEventListener('mousedown', function(e) {
            e.preventDefault();   // keep focus on input so blur doesn't fire first
            onSelect(TRACKS[i]);
            inputEl.value = TRACKS[i];
            resultsEl.style.display = 'none';
          });
          resultsEl.appendChild(div);
          if (++hits >= 150) break;
        }
      }
      if (hits === 0) {
        resultsEl.innerHTML = '<div class="sim-search-item" style="color:#888;cursor:default;">No matches</div>';
      }
      resultsEl.style.display = 'block';
    }

    (function() {
      const aIn  = document.getElementById('lp-a-search');
      const aRes = document.getElementById('lp-a-results');
      const bIn  = document.getElementById('lp-b-search');
      const bRes = document.getElementById('lp-b-results');

      const onA = name => lpLoad(name, parseFloat(document.getElementById('lp-pos').value));
      const onB = name => lpSetB(name);

      aIn.addEventListener('focus', () => _lpRenderSearch(aIn, aRes, aIn.value, onA));
      aIn.addEventListener('input', () => _lpRenderSearch(aIn, aRes, aIn.value, onA));
      aIn.addEventListener('blur',  () => setTimeout(() => { aRes.style.display = 'none'; }, 150));

      bIn.addEventListener('focus', () => _lpRenderSearch(bIn, bRes, bIn.value, onB));
      bIn.addEventListener('input', () => _lpRenderSearch(bIn, bRes, bIn.value, onB));
      bIn.addEventListener('blur',  () => setTimeout(() => { bRes.style.display = 'none'; }, 150));
    })();

    _lpPollStatus();

  </script>
</body>

</html>
